server:
  port: 8080

spring:
  webflux:
    problemdetails:
      enabled: true
  application:
    name: rbac-gateway
  
  # R2DBC configuration for Postgres
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/audit_db
    username: admin
    password: password
    pool:
      initial-size: 10
      max-size: 50
  
  # Flyway configuration
  flyway:
    url: jdbc:postgresql://localhost:5432/audit_db
    user: admin
    password: password
    enabled: true

  # Security configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Mock issuer URI for testing purposes (this should be the actual IdP URL)
          issuer-uri: "https://mock-idp.local/oauth2/default"

  # Cloud Gateway routes (example mapping everything downstream)
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@principalNameKeyResolver}"
        - name: CircuitBreaker
          args:
            name: downstreamCircuitBreaker
            fallbackUri: forward:/fallback
      routes:
        - id: downstream-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**

# Custom OPA Configuration
opa:
  base-url: "http://localhost:8181"
  url: "http://localhost:8181/v1/data/authz/allow"

# Actuator & Prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# Logging configuration
logging:
  level:
    com.enterprise.policy: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

# Resilience4j Circuit Breaker Config
resilience4j.circuitbreaker:
  instances:
    opaClient:
      registerHealthIndicator: true
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 3
      automaticTransitionFromOpenToHalfOpenEnabled: true
      waitDurationInOpenState: 5s
      failureRateThreshold: 50
    downstreamCircuitBreaker:
      registerHealthIndicator: true
      slidingWindowSize: 20
      minimumNumberOfCalls: 10
      permittedNumberOfCallsInHalfOpenState: 3
      automaticTransitionFromOpenToHalfOpenEnabled: true
      waitDurationInOpenState: 10s
      failureRateThreshold: 50

resilience4j.timelimiter:
  instances:
    downstreamCircuitBreaker:
      timeoutDuration: 3s
