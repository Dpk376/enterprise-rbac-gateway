server:
  port: 8080

spring:
  application:
    name: rbac-gateway
  
  # R2DBC configuration for Postgres
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/audit_db
    username: admin
    password: password
    pool:
      initial-size: 10
      max-size: 50
  
  # Flyway configuration
  flyway:
    url: jdbc:postgresql://localhost:5432/audit_db
    user: admin
    password: password
    enabled: true

  # Security configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Mock issuer URI for testing purposes (this should be the actual IdP URL)
          issuer-uri: "https://mock-idp.local/oauth2/default"

  # Cloud Gateway routes (example mapping everything downstream)
  cloud:
    gateway:
      routes:
        - id: downstream-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**

# Custom OPA Configuration
opa:
  url: "http://localhost:8181/v1/data/authz/allow"

# Actuator & Prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# Logging configuration
logging:
  level:
    com.enterprise.policy: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
